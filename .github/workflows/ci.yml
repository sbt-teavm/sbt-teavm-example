on:
  pull_request:
  push:
jobs:
  test:
    runs-on: "ubuntu-22.04"
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        java-version: 17
        distribution: adopt
        cache: sbt
    - uses: sbt/setup-sbt@v1    
    - uses: bytecodealliance/actions/wasmtime/setup@9152e710e9f7182e4c29ad218e4f335a7b203613 # v1.1.3
    - run: wasmtime --version
    - run: node --version
    - run: npm --version
    - run: sbt "teavmJS/run js"
    - run: sbt "teavmWasm/run wasm"
    - run: sbt "teavmWasi/run wasi"
    - run: sbt copyWASM
    - run: wasmtime main.wasm
