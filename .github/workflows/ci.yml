on:
  pull_request:
  push:
jobs:
  test:
    runs-on: "ubuntu-22.04"
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        java-version: 17
        distribution: adopt
        cache: sbt
    - uses: sbt/setup-sbt@v1    
    - run: node --version
    - run: npm --version
    - run: sbt "teavmJS/run js"
